<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="icon" type="image/png" href="../icon_new.png" />
  <link rel="stylesheet" href="viewer.css" />
  <title>Image Viewer</title>
</head>

<body>
    <div class="backgroundPattern"></div>
    <div id="wrapper">
      <img id="oipImageViewer">
      <canvas id="gifCanvas"></canvas>
    </div>

    <div id="gifControls">
      <button id="gifPlayPause" title="Play GIF" type="button">
        <img src="icons/play_circle_outline.svg" alt="Play GIF">
      </button>
      <input id="gifSeek" type="range" min="0" max="0" value="0" />
      <span id="gifStatus" title="Current frame"></span>
      <button id="gifLoop" type="button" title="Loop GIF">
        <img src="icons/repeat_on.svg" alt="Loop GIF">
      </button>
    </div>

    <div id="imageControls">
      <button id="resetZoomButton" type="button" title="Fit to screen">
        <img src="icons/aspect_ratio.svg" alt="Fit to screen">
      </button>
      <input id="zoomSlider" title="Image zoom" type="range" min="0.1" max="5" step="0.1" value="1" />
      <span id="zoomPercent">100%</span>
      <button id="rotateButton" type="button" title="Rotate image">
        <img src="icons/rotate_right.svg" alt="Rotate image">
      </button>
      <button id="darkModeButton" type="button" title="Toggle background dark mode">
        <img src="icons/brightness.svg" alt="Toggle dark mode">
      </button>
    </div>

  <!-- <script src="../configs.js"></script> -->
  <script src="../content.js"></script>
  <script src="functions/gifViewer.js"></script>
  <script src="viewer.js"></script>
</body>
</html>
