<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="icon" type="image/png" href="../icon_new.png" />
  <link rel="stylesheet" href="viewer.css" />
  <title>Image Viewer</title>
</head>

<body>
    <div class="backgroundPattern"></div>
    <div id="wrapper">
      <img id="image">
      <canvas id="gifCanvas"></canvas>
    </div>

    <div id="gifControls">
      <button id="gifPlayPause" type="button">▶️</button>
      <input id="gifSeek" type="range" min="0" max="0" value="0" />
      <span id="gifStatus"></span>
      <button id="gifLoop" type="button">🔁</button>
    </div>

  <!-- <script src="../configs.js"></script> -->
  <script src="../content.js"></script>
  <script src="viewer.js"></script>
</body>
</html>
